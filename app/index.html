<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ZenNotes | Digital Silence</title>
    
    <!-- Tailwind CSS with custom configuration matching DESIGN.md -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface": "#0f1417",
                        "surface-dim": "#0f1417",
                        "surface-bright": "#353a3d",
                        "surface-container-lowest": "#0a0f12",
                        "surface-container-low": "#171c1f",
                        "surface-container": "#1b2023",
                        "surface-container-high": "#262b2e",
                        "surface-container-highest": "#313539",
                        "on-surface": "#dfe3e7",
                        "on-surface-variant": "#c6c6cd",
                        "inverse-surface": "#dfe3e7",
                        "inverse-on-surface": "#2c3134",
                        "outline": "#909097",
                        "outline-variant": "#46464c",
                        "surface-tint": "#c0c6de",
                        "primary": "#c0c6de",
                        "on-primary": "#2a3043",
                        "primary-container": "#020617",
                        "on-primary-container": "#72778d",
                        "inverse-primary": "#585e73",
                        "secondary": "#b9c8de",
                        "on-secondary": "#233143",
                        "secondary-container": "#39485a",
                        "on-secondary-container": "#a7b6cc",
                        "tertiary": "#4de082",
                        "on-tertiary": "#003919",
                        "tertiary-container": "#000902",
                        "on-tertiary-container": "#008a46",
                        "error": "#ffb4ab",
                        "on-error": "#690005",
                        "error-container": "#93000a",
                        "on-error-container": "#ffdad6",
                        "background": "#020617", /* Explicitly using Slate-950 per brand specs */
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "gutter": "32px",
                        "margin-desktop": "64px",
                        "unit": "8px",
                        "container-max": "800px",
                        "margin-mobile": "24px"
                    },
                    fontFamily: {
                        "body-lg": ["JetBrains Mono", "monospace"],
                        "body-md": ["JetBrains Mono", "monospace"],
                        "label-sm": ["Geist", "sans-serif"],
                        "headline-lg": ["Geist", "sans-serif"],
                        "headline-md": ["Geist", "sans-serif"],
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS Styles -->
    <link href="css/styles.css" rel="stylesheet"/>

    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-background text-on-surface font-body-md selection:bg-primary/20 selection:text-on-surface min-h-screen flex overflow-hidden">

    <!-- ── App Loader (Loading State) ── -->
    <div id="app-loader" class="fixed inset-0 bg-[#020617] z-50 flex flex-col items-center justify-center gap-4">
        <div class="loader-spinner"></div>
        <p class="font-label-sm text-label-sm text-on-surface-variant/40 tracking-widest uppercase">Connecting to Zen...</p>
    </div>

    <!-- ── Authentication Overlay (Phase 3) ── -->
    <div id="auth-overlay" class="fixed inset-0 bg-background/80 backdrop-blur-xl z-40 opacity-0 pointer-events-none transition-opacity duration-500 flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-surface-container p-8 rounded-xl flex flex-col gap-6 shadow-2xl transition-all duration-300">
            <!-- Tabs -->
            <div class="flex border-b border-outline-variant">
                <button id="auth-tab-login" class="flex-1 pb-3 text-center font-label-sm text-label-sm text-on-surface border-b-2 border-primary transition-colors">
                    Sign In
                </button>
                <button id="auth-tab-register" class="flex-1 pb-3 text-center font-label-sm text-label-sm text-on-surface-variant/50 transition-colors">
                    Register
                </button>
            </div>

            <!-- Title -->
            <div class="flex flex-col gap-1 mt-2">
                <h3 id="auth-title" class="font-headline-md text-headline-md text-on-surface tracking-tighter">Welcome Back</h3>
                <p class="font-label-sm text-label-sm text-on-surface-variant/40 uppercase tracking-widest">Digital Silence Awaits</p>
            </div>

            <!-- Form -->
            <form id="auth-form" class="flex flex-col gap-4">
                <div class="flex flex-col gap-1">
                    <label for="auth-email" class="font-label-sm text-label-sm text-on-surface-variant/60">Email</label>
                    <input type="email" id="auth-email" required class="bg-transparent border-none p-0 focus:ring-0 text-on-surface placeholder:text-on-surface-variant/20 border-b border-outline-variant/30 focus:border-on-surface transition-colors pb-2" placeholder="you@domain.com"/>
                </div>

                <div class="flex flex-col gap-1 mt-2">
                    <label for="auth-password" class="font-label-sm text-label-sm text-on-surface-variant/60">Password</label>
                    <input type="password" id="auth-password" required class="bg-transparent border-none p-0 focus:ring-0 text-on-surface placeholder:text-on-surface-variant/20 border-b border-outline-variant/30 focus:border-on-surface transition-colors pb-2" placeholder="••••••••"/>
                </div>

                <!-- Error Display -->
                <p id="auth-error" class="text-error font-label-sm text-xs opacity-0 transition-opacity duration-300"></p>

                <!-- Submit Button -->
                <button type="submit" id="auth-submit-btn" class="w-full mt-4 py-3 bg-surface-bright text-on-surface font-label-sm text-label-sm rounded hover:bg-surface-container-highest active:scale-98 transition-all flex items-center justify-center gap-2">
                    <span>Sign In</span>
                    <div id="auth-spinner" class="loader-spinner w-4 h-4 hidden"></div>
                </button>
            </form>

            <!-- Toggle Link -->
            <p class="text-center font-label-sm text-xs text-on-surface-variant/40 mt-2">
                <span id="auth-toggle-text">Don't have an account?</span>
                <a href="#" id="auth-toggle-link" class="text-primary hover:opacity-85 transition-opacity ml-1">Create one</a>
            </p>
        </div>
    </div>

    <!-- ── Mobile History Sidebar Overlay ── -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-[#020617]/60 backdrop-blur-sm z-30 opacity-0 pointer-events-none transition-opacity duration-500"></div>

    <!-- ── Main App Container ── -->
    <div id="app-main" class="hidden flex h-screen w-full">
        
        <!-- ── Collapsible Sidebar ── -->
        <aside id="sidebar" class="w-3/4 md:w-1/3 lg:w-1/4 h-screen fixed lg:relative left-0 top-0 z-30 -translate-x-full lg:translate-x-0 sidebar-transition bg-[#020617] flex flex-col justify-between py-16 px-12 border-none">
            <div class="flex flex-col space-y-12">
                <!-- Brand Anchor -->
                <div class="flex flex-col space-y-2">
                    <h1 class="font-headline-md text-headline-md text-on-surface tracking-tighter">🗒️ ZenNotes</h1>
                    <p class="font-label-sm text-label-sm text-on-surface-variant/40 tracking-widest uppercase">Digital Silence</p>
                </div>

                <!-- CTA: Write Today -->
                <button id="btn-write-today" class="w-fit font-label-sm text-label-sm text-on-surface hover:opacity-70 transition-opacity duration-300 text-left">
                    + Write Today
                </button>

                <!-- History Navigation List -->
                <nav id="history-list" class="flex flex-col space-y-8 max-h-[50vh] overflow-y-auto custom-scrollbar pr-2">
                    <!-- Loaded dynamically via js -->
                </nav>
            </div>

            <!-- Sidebar Footer -->
            <div class="flex flex-col space-y-4">
                <!-- Search bar input -->
                <div class="flex items-center space-x-3 text-on-surface-variant/50 hover:text-on-surface transition-colors cursor-pointer group">
                    <span class="material-symbols-outlined text-[18px]">search</span>
                    <input type="text" id="search-input" placeholder="Search notes..." class="bg-transparent border-none p-0 focus:ring-0 text-on-surface placeholder:text-on-surface-variant/30 text-xs w-full"/>
                </div>

                <!-- Backup Button -->
                <div id="btn-download-backup" class="flex items-center space-x-3 text-on-surface-variant/50 hover:text-on-surface transition-colors cursor-pointer group">
                    <span class="material-symbols-outlined text-[18px]">cloud_download</span>
                    <span class="font-label-sm text-label-sm">Download Backup</span>
                </div>
            </div>
        </aside>

        <!-- ── Main Content Canvas ── -->
        <main class="flex-1 h-screen bg-[#020617] overflow-y-auto relative flex flex-col items-center custom-scrollbar">
            
            <!-- TopAppBar Contextual Shell -->
            <header id="header" class="w-full flex justify-between items-center px-8 md:px-16 py-12 sticky top-0 bg-[#020617]/80 backdrop-blur-sm z-10">
                <div class="flex items-center space-x-4">
                    <!-- Mobile Hamburger -->
                    <button id="sidebar-toggle" class="lg:hidden hover:opacity-75 transition-opacity flex items-center">
                        <span class="material-symbols-outlined text-on-surface text-[24px]">menu</span>
                    </button>
                    <h2 id="header-date" class="font-headline-lg text-2xl md:text-headline-lg text-on-surface"></h2>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="cloud-status" class="hidden md:inline font-label-sm text-label-sm text-on-surface-variant/60">Offline</span>
                    <div id="sync-dot" class="sync-dot sync-dot--idle"></div>
                    <button id="btn-sync" class="hover:opacity-70 transition-opacity flex items-center" title="Manual Sync">
                        <span class="material-symbols-outlined text-on-surface-variant/40 text-[20px]">sync</span>
                    </button>
                </div>
            </header>

            <!-- Editor Section -->
            <div class="w-full max-w-[800px] px-8 md:px-16 pb-32 flex flex-col flex-1">
                <div class="relative w-full h-full min-h-[400px]">
                    <textarea id="zen-editor" class="w-full h-full bg-transparent border-none p-0 font-body-lg text-body-lg text-on-surface placeholder:text-on-surface-variant/20 resize-none leading-relaxed min-h-[500px]" placeholder="Write down whatever is on your mind or heart today..."></textarea>
                </div>
            </div>

            <!-- Footer Stats (Digital Silence styling) -->
            <div id="footer-stats" class="fixed bottom-6 left-8 lg:left-[calc(25%+2rem)] right-8 flex justify-between items-center opacity-30 hover:opacity-100 transition-opacity duration-700 pointer-events-none">
                <div class="flex gap-6 font-label-sm text-label-sm text-on-surface pointer-events-auto">
                    <span id="word-count">0 words</span>
                    <span id="char-count">0 characters</span>
                </div>
                <div class="flex items-center gap-4 pointer-events-auto">
                    <span id="user-email" class="font-label-sm text-label-sm text-on-surface-variant/60 hidden sm:inline"></span>
                    <button id="btn-sign-out" class="font-label-sm text-label-sm text-error hover:opacity-80 transition-opacity">Sign Out</button>
                </div>
            </div>

            <!-- Custom Zen Cursor Indicator -->
            <div class="fixed bottom-12 right-12 flex items-center space-x-2 opacity-20 pointer-events-none">
                <div class="zen-cursor"></div>
            </div>
        </main>
    </div>

    <!-- Main App Module Script -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
